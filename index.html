<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Gift for Saud</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #fce4ec, #f8bbd0, #f48fb1);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: sans-serif;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.4);
            padding: 30px;
            border-radius: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            width: 85%;
            max-width: 320px;
        }
        .heart { font-size: 70px; animation: pulse 1.5s infinite; margin-bottom: 10px; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        h1 { color: #880e4f; margin: 0; font-size: 26px; transition: all 0.5s ease; }
        .anniversary-text { color: #d4af37; font-size: 24px; font-weight: bold; }
        .timer { font-size: 20px; margin-top: 15px; color: #ad1457; font-weight: bold; direction: ltr; }
        .message-outside { font-size: 13px; margin-top: 25px; color: #880e4f; text-align: center; max-width: 280px; z-index: 10; line-height: 1.5; opacity: 0.9; }

        /* زر الموسيقى بشكل أوضح */
        #music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            background: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: none;
        }

        .decoration { position: absolute; user-select: none; animation: fall linear infinite; top: -20px; z-index: 1; }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>

    <button id="music-control" onclick="toggleMusic()">🎵</button>
    
    <div id="youtube-player"></div>

    <div class="container">
        <div class="heart">💕</div>
        <h1 id="main-title">أحبك سعود 💕</h1>
        <div id="timer" class="timer">Loading...</div>
    </div>

    <p class="message-outside">هذا أول موقع ابنيه وحبيت أعبر عن حبي لك فيه، لأن كل حاجة تفرحني تذكرني فيك</p>

    <script>
        // إعداد مشغل يوتيوب
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var isReady = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 's07pXUf8sV8', // ID أغنية All Mine
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'modestbranding': 1,
                    'loop': 1
                },
                events: {
                    'onReady': function() { isReady = true; }
                }
            });
        }

        function toggleMusic() {
            if (!isReady) return;
            
            var state = player.getPlayerState();
            if (state == YT.PlayerState.PLAYING) {
                player.pauseVideo();
                document.getElementById('music-control').innerHTML = "🔇";
            } else {
                player.playVideo();
                document.getElementById('music-control').innerHTML = "🎵";
            }
        }

        // باقي كود العداد والزينة
        const startDate = new Date('2025-07-21T00:00:00');
        let isAnniversary = false;

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / 86400000);
            const hours = Math.floor((diff % 86400000) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('timer').innerHTML = days + " Days<br>" + hours + "h " + minutes + "m " + seconds + "s";

            const title = document.getElementById('main-title');
            if (days === 365) {
                isAnniversary = true;
                title.innerHTML = "Our First Anniversary ✨";
                title.className = "anniversary-text";
            } else {
                isAnniversary = false;
                title.innerHTML = "أحبك سعود 💕";
                title.className = ""; 
            }
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        function createDecoration() {
            const dec = document.createElement('div');
            dec.classList.add('decoration');
            let items = ['💕', '💗'];
            if (isAnniversary) {
                items = ['💕', '✨', '🌸', '🎊', '💗', '⭐'];
            }
            dec.innerHTML = items[Math.floor(Math.random() * items.length)];
            dec.style.left = Math.random() * 100 + 'vw';
            dec.style.animationDuration = Math.random() * 3 + 4 + 's';
            dec.style.fontSize = Math.random() * 10 + 15 + 'px';
            document.body.appendChild(dec);
            setTimeout(() => { dec.remove(); }, 6000);
        }
        setInterval(createDecoration, 300);
    </script>
</body>
</html>
